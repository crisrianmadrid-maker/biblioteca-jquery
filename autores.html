<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Autores - Biblioteca Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-book me-2"></i>Biblioteca Digital
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto" id="navMenu"></ul>
                <div id="userSection" class="d-flex align-items-center gap-2"></div>
            </div>
        </div>
    </nav>

    <!-- Contenido -->
    <main class="container mt-4" style="padding-bottom: 80px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-person text-primary me-2"></i>Gestión de Autores</h2>
            <button class="btn btn-primary" id="btnNuevoAutor">
                <i class="bi bi-plus-circle me-2"></i> Nuevo Autor
            </button>
        </div>

        <div id="alertContainer"></div>

        <!-- Formulario (oculto inicialmente) -->
        <div id="formContainer" class="card mb-4 shadow-sm" style="display:none;">
            <div class="card-body">
                <h5 class="card-title" id="formTitle">Nuevo Autor</h5>
                <form id="autorForm">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre del Autor *</label>
                        <input type="text" id="nombre" class="form-control" placeholder="Ej: Gabriel García Márquez" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary" id="btnGuardarAutor">
                            <i class="bi bi-save me-2"></i> Guardar
                        </button>
                        <button type="button" class="btn btn-secondary" id="btnCancelar">
                            <i class="bi bi-x-circle me-2"></i> Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Lista de autores -->
        <div id="autoresList" class="row">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="text-muted mt-2">Cargando autores...</p>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/autores.js"></script>
</body>
</html>
