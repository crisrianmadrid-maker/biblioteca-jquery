<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Biblioteca Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4">
                            <i class="bi bi-book text-primary me-2"></i>
                            Biblioteca Digital
                        </h3>
                        <h5 class="text-center text-muted mb-4">Crear Cuenta</h5>

                        <div id="alertContainer"></div>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre Completo</label>
                                <input type="text" id="nombre" class="form-control" placeholder="Tu nombre" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" class="form-control" placeholder="ejemplo@email.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required>
                                <small class="text-muted">La contraseña debe tener al menos 6 caracteres</small>
                            </div>
                            <button type="submit" class="btn btn-success w-100" id="registerBtn">
                                <i class="bi bi-person-plus me-2"></i> Registrarse
                            </button>
                        </form>

                        <div class="text-center mt-3">
                            <small>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
    $(document).ready(function() {
        // Si ya está autenticado, redirigir al dashboard
        if (typeof isAuthenticated !== 'undefined' && isAuthenticated()) {
            window.location.href = 'dashboard.html';
            return;
        }

        $('#registerForm').on('submit', async function(e) {
            e.preventDefault();
            
            const nombre = $('#nombre').val().trim();
            const email = $('#email').val().trim();
            const password = $('#password').val();
            const btn = $('#registerBtn');
            
            // Validaciones
            if (!nombre || nombre.length < 2) {
                showAlert('danger', 'Por favor ingresa tu nombre completo');
                return;
            }
            
            if (!email) {
                showAlert('danger', 'Por favor ingresa tu email');
                return;
            }
            
            if (password.length < 6) {
                showAlert('danger', 'La contraseña debe tener al menos 6 caracteres');
                return;
            }
            
            btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span> Registrando...');
            
            try {
                const result = await apiRequest('POST', '/auth/register', {
                    nombre: nombre,
                    email: email,
                    password: password
                });
                
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user));
                
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                showAlert('danger', error.message || 'Error al registrarse');
                btn.prop('disabled', false).html('<i class="bi bi-person-plus me-2"></i> Registrarse');
            }
        });

        function showAlert(type, message) {
            const container = $('#alertContainer');
            container.html(`
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="bi bi-${type === 'danger' ? 'exclamation-triangle' : 'check-circle'}-fill me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `);
            
            setTimeout(() => {
                container.find('.alert').alert('close');
            }, 5000);
        }
    });
    </script>
</body>
</html>
