<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Digital - Inicio</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-book me-2"></i>Biblioteca Digital
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto" id="navMenu">
                    <!-- Las opciones se cargarán dinámicamente según autenticación -->
                </ul>
                <div id="userSection" class="d-flex align-items-center gap-2">
                    <!-- Se carga dinámicamente -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="min-vh-100" style="padding-bottom: 60px;">
        <div class="container mt-5">
            <div class="row align-items-center">
                <div class="col-lg-6">
                    <h1 class="display-4 fw-bold">
                        <i class="bi bi-book text-primary"></i> Biblioteca Digital
                    </h1>
                    <p class="lead mt-3">
                        Sistema de gestión de préstamos de libros con APIs REST.
                        Administra autores, libros y préstamos de manera fácil y eficiente.
                    </p>
                    <div class="mt-4" id="homeButtons">
                        <!-- Botones dinámicos según autenticación -->
                    </div>
                </div>
                <div class="col-lg-6 text-center">
                    <div class="bg-light rounded-4 p-4 shadow-sm">
                        <i class="bi bi-collection text-primary" style="font-size: 8rem;"></i>
                        <div class="row mt-4">
                            <div class="col-4">
                                <div class="border rounded-3 p-2">
                                    <i class="bi bi-person text-primary" style="font-size: 2rem;"></i>
                                    <p class="mb-0 small">Autores</p>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="border rounded-3 p-2">
                                    <i class="bi bi-book text-success" style="font-size: 2rem;"></i>
                                    <p class="mb-0 small">Libros</p>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="border rounded-3 p-2">
                                    <i class="bi bi-arrow-left-right text-warning" style="font-size: 2rem;"></i>
                                    <p class="mb-0 small">Préstamos</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-3 fixed-bottom">
        <div class="container text-center">
            <small>&copy; 2026 Biblioteca Digital - Todos los derechos reservados</small>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
