<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Libros</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow"><div class="container">
<a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-book me-2"></i>Biblioteca Digital</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
<div class="collapse navbar-collapse" id="navbarNav"><ul class="navbar-nav me-auto" id="navMenu"></ul><div id="userSection" class="d-flex align-items-center gap-2"></div></div>
</div></nav>
<main class="container mt-4" style="padding-bottom:80px;">
<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
<h2><i class="bi bi-book text-primary me-2"></i>Gestión de Libros</h2>
<button class="btn btn-primary" id="btnNuevoLibro"><i class="bi bi-plus-circle me-2"></i> Nuevo Libro</button>
</div>
<div class="mb-4"><div class="input-group">
<input type="text" id="searchInput" class="form-control" placeholder="Buscar por título, ISBN o autor...">
<button class="btn btn-primary" id="btnBuscar"><i class="bi bi-search"></i> Buscar</button>
<button class="btn btn-secondary" id="btnLimpiarBusqueda"><i class="bi bi-x"></i> Limpiar</button>
</div></div>
<div id="alertContainer"></div>
<div id="formContainer" class="card mb-4 shadow-sm" style="display:none;"><div class="card-body"><h5 class="card-title" id="formTitle">Nuevo Libro</h5>
<form id="libroForm"><input type="hidden" id="editId">
<div class="row"><div class="col-md-6 mb-3"><label for="titulo" class="form-label">Título *</label><input type="text" id="titulo" class="form-control" placeholder="Ej: Cien años de soledad" required></div>
<div class="col-md-6 mb-3"><label for="isbn" class="form-label">ISBN *</label><input type="text" id="isbn" class="form-control" placeholder="978-84-376-0494-7" required></div>
<div class="col-md-6 mb-3"><label for="id_autor" class="form-label">Autor *</label><select id="id_autor" class="form-select" required><option value="">Selecciona un autor</option></select></div>
<div class="col-md-6 mb-3"><label for="disponibles" class="form-label">Cantidad Disponible</label><input type="number" id="disponibles" class="form-control" value="1" min="0"></div></div>
<div class="d-flex gap-2"><button type="submit" class="btn btn-primary" id="btnGuardarLibro"><i class="bi bi-save me-2"></i> Guardar</button><button type="button" class="btn btn-secondary" id="btnCancelar"><i class="bi bi-x-circle me-2"></i> Cancelar</button></div></form></div></div>
<div id="librosList" class="row"><div class="text-center py-5"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Cargando...</span></div><p class="text-muted mt-2">Cargando libros...</p></div></div>
</main>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/libros.js"></script>
</body>
</html>
